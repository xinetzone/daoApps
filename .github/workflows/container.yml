name: Frontend Container Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'deploy/frontend/**'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'deploy/frontend/**'
      - 'pnpm-lock.yaml'

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/dao

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [config-center, oauth-admin]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/frontend/Containerfile.pnpm
          build-args: APP_NAME=${{ matrix.app }}
          push: false
          load: true
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}-ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}-ui:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
