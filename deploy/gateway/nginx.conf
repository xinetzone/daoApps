# ============================================
# API 网关 Nginx 配置
# 统一入口，路由到各后端微服务
#
# 注意: 后端服务独立部署，请根据实际环境修改下方 upstream 地址。
#   - 开发环境: 可直接使用 localhost + 端口
#   - 生产环境: 替换为后端服务的实际主机名或 IP + 端口
#   - 容器化部署: 可通过 envsubst 注入环境变量，
#     例如将 127.0.0.1 替换为 ${CONFIG_CENTER_HOST} 等
# ============================================

# 上游服务定义
# 配置中心（默认端口 8000，请根据实际部署修改地址）
upstream config-center {
    server 127.0.0.1:8000;
}

# 数据同步服务（默认端口 8001，请根据实际部署修改地址）
upstream data-sync-api {
    server 127.0.0.1:8001;
}

# 日志平台服务（默认端口 8100，请根据实际部署修改地址）
upstream log-platform-api {
    server 127.0.0.1:8100;
}

# QR 码服务（默认端口 5174，请根据实际部署修改地址）
upstream qrcode-api {
    server 127.0.0.1:5174;
}

# 请求频率限制区域
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

server {
    listen 80;
    server_name _;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 请求体大小限制（文件上传场景需调整）
    client_max_body_size 50m;

    # 默认代理头
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # 超时配置
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # ==================== 配置中心 ====================
    location /api/v1/config/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://config-center/api/v1/;
    }

    # 配置中心 WebSocket 推送
    location /ws/push/ {
        proxy_pass http://config-center/api/v1/push/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ==================== 数据同步 ====================
    location /api/v1/sync/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://data-sync-api/api/v1/;
    }

    # ==================== 日志平台 ====================
    location /api/v1/logs/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://log-platform-api/api/v1/;
    }

    # ==================== QR 码服务 ====================
    location /api/v1/qrcode/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://qrcode-api/api/;
    }

    # ==================== 健康检查 ====================

    # 网关自身健康检查
    location = /health {
        access_log off;
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # 聚合所有后端服务健康状态
    location = /health/backends {
        access_log off;
        proxy_pass http://config-center/api/v1/health;
        # 仅做连通性探测，实际可扩展为 Lua 聚合
    }

    # 各服务独立健康检查透传
    location = /health/config-center {
        access_log off;
        proxy_pass http://config-center/api/v1/health;
    }

    location = /health/data-sync {
        access_log off;
        proxy_pass http://data-sync-api/api/v1/health;
    }

    location = /health/log-platform {
        access_log off;
        proxy_pass http://log-platform-api/api/v1/health;
    }

    location = /health/qrcode {
        access_log off;
        proxy_pass http://qrcode-api/api/health;
    }

    # ==================== 默认响应 ====================
    location / {
        return 404 '{"error":"not_found","message":"No route matched"}';
        add_header Content-Type application/json;
    }
}
