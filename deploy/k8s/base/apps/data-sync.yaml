# 数据同步 API Deployment + Service + Scheduler Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-sync-api
  namespace: taolib
  labels:
    app.kubernetes.io/name: data-sync
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: taolib
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-sync
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-sync
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: data-sync-api
          image: localhost/taolib-data-sync:latest
          ports:
            - containerPort: 8001
              name: http
          env:
            - name: DATA_SYNC_MONGO_URL
              value: "mongodb://mongodb:27017"
            - name: DATA_SYNC_HOST
              value: "0.0.0.0"
            - name: DATA_SYNC_PORT
              value: "8001"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-sync-scheduler
  namespace: taolib
  labels:
    app.kubernetes.io/name: data-sync
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: taolib
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: data-sync
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: data-sync
        app.kubernetes.io/component: scheduler
    spec:
      containers:
        - name: data-sync-scheduler
          image: localhost/taolib-data-sync:latest
          command: ["python", "-m", "taolib.data_sync.cli", "scheduler"]
          env:
            - name: DATA_SYNC_MONGO_URL
              value: "mongodb://mongodb:27017"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: data-sync-api
  namespace: taolib
  labels:
    app.kubernetes.io/name: data-sync
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: data-sync
    app.kubernetes.io/component: api
  ports:
    - port: 8001
      targetPort: http
      name: http
