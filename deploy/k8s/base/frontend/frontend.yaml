# 前端应用 Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-center-ui
  namespace: taolib
  labels:
    app.kubernetes.io/name: config-center-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: taolib
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: config-center-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: config-center-ui
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: config-center-ui
          image: localhost/taolib-config-center-ui:latest
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-admin-ui
  namespace: taolib
  labels:
    app.kubernetes.io/name: oauth-admin-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: taolib
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth-admin-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth-admin-ui
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: oauth-admin-ui
          image: localhost/taolib-oauth-admin-ui:latest
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: config-center-ui
  namespace: taolib
spec:
  selector:
    app.kubernetes.io/name: config-center-ui
  ports:
    - port: 80
      targetPort: http
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-admin-ui
  namespace: taolib
spec:
  selector:
    app.kubernetes.io/name: oauth-admin-ui
  ports:
    - port: 80
      targetPort: http
      name: http
