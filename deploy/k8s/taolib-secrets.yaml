# ============================================
# Taolib Secrets - Kubernetes/Podman 密钥配置
# 用法: podman kube play deploy/k8s/taolib-secrets.yaml
# 注意: 生产环境请替换为安全的随机值
# ============================================

apiVersion: v1
kind: Secret
metadata:
  name: taolib-secrets
  labels:
    app: taolib
type: Opaque
stringData:
  # JWT 密钥 - 生产环境必须更改
  # 生成方式: openssl rand -hex 32
  jwt-secret: "" # MUST be set before deployment
