# ============================================
# [已废弃] Taolib Podman Pod - Kubernetes 兼容配置
# 此文件已被 Kustomize 结构（base/ + overlays/）替代。
# 新部署请使用:
#   kubectl apply -k deploy/k8s/overlays/dev/    # 开发环境
#   kubectl apply -k deploy/k8s/overlays/prod/   # 生产环境
# 旧用法（仅保留兼容）: podman kube play deploy/k8s/taolib-pod.yaml
# ============================================

apiVersion: v1
kind: Pod
metadata:
  name: taolib-pod
  labels:
    app: taolib
    version: "1.0.0"
    environment: production
  annotations:
    description: "Taolib 全栈应用 Pod（基础设施 + 应用服务 + 前端）"
spec:
  # DNS 配置确保容器间可通过 localhost 互通
  hostNetwork: false

  # ==================== 初始化容器 ====================
  initContainers:
    - name: wait-for-mongo
      image: docker.io/library/mongo:7
      command:
        [
          "sh",
          "-c",
          'until mongosh --host localhost --eval ''db.adminCommand("ping")'' --quiet; do echo ''Waiting for MongoDB...''; sleep 3; done',
        ]
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"

  containers:
    # ==================== 基础设施 ====================

    - name: mongodb
      image: docker.io/library/mongo:7
      ports:
        - containerPort: 27017
          hostPort: 27017
          protocol: TCP
      volumeMounts:
        - name: mongo-data
          mountPath: /data/db
      livenessProbe:
        exec:
          command: ["mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
        initialDelaySeconds: 30
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3
      readinessProbe:
        exec:
          command: ["mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
        limits:
          memory: "1Gi"
          cpu: "500m"

    - name: redis
      image: docker.io/library/redis:7-alpine
      command:
        [
          "redis-server",
          "--appendonly",
          "yes",
          "--maxmemory",
          "256mb",
          "--maxmemory-policy",
          "allkeys-lru",
        ]
      ports:
        - containerPort: 6379
          hostPort: 6379
          protocol: TCP
      volumeMounts:
        - name: redis-data
          mountPath: /data
      livenessProbe:
        exec:
          command: ["redis-cli", "ping"]
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        exec:
          command: ["redis-cli", "ping"]
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "200m"

    - name: elasticsearch
      image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
      ports:
        - containerPort: 9200
          hostPort: 9200
          protocol: TCP
      env:
        - name: discovery.type
          value: "single-node"
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
      volumeMounts:
        - name: es-data
          mountPath: /usr/share/elasticsearch/data
      livenessProbe:
        httpGet:
          path: /_cluster/health
          port: 9200
        initialDelaySeconds: 60
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 5
      readinessProbe:
        httpGet:
          path: /_cluster/health?wait_for_status=yellow&timeout=5s
          port: 9200
        initialDelaySeconds: 30
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 3
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"

    # ==================== 应用服务 ====================

    - name: config-center
      image: localhost/taolib-config-center:latest
      ports:
        - containerPort: 8000
          hostPort: 8000
          protocol: TCP
      env:
        - name: CONFIG_CENTER_MONGO_URL
          value: "mongodb://localhost:27017"
        - name: CONFIG_CENTER_REDIS_URL
          value: "redis://localhost:6379"
        - name: CONFIG_CENTER_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: taolib-secrets
              key: jwt-secret
        - name: CONFIG_CENTER_HOST
          value: "0.0.0.0"
        - name: CONFIG_CENTER_PORT
          value: "8000"
      livenessProbe:
        httpGet:
          path: /api/v1/health
          port: 8000
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /api/v1/health
          port: 8000
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
        limits:
          memory: "512Mi"
          cpu: "500m"

    - name: data-sync-api
      image: localhost/taolib-data-sync:latest
      ports:
        - containerPort: 8001
          hostPort: 8001
          protocol: TCP
      env:
        - name: DATA_SYNC_MONGO_URL
          value: "mongodb://localhost:27017"
        - name: DATA_SYNC_HOST
          value: "0.0.0.0"
        - name: DATA_SYNC_PORT
          value: "8001"
      livenessProbe:
        httpGet:
          path: /api/v1/health
          port: 8001
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /api/v1/health
          port: 8001
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
        limits:
          memory: "512Mi"
          cpu: "500m"

    - name: data-sync-scheduler
      image: localhost/taolib-data-sync:latest
      command: ["python", "-m", "taolib.data_sync.cli", "scheduler"]
      env:
        - name: DATA_SYNC_MONGO_URL
          value: "mongodb://localhost:27017"
      resources:
        requests:
          memory: "128Mi"
          cpu: "100m"
        limits:
          memory: "256Mi"
          cpu: "250m"

    - name: log-platform-api
      image: localhost/taolib-log-platform:latest
      ports:
        - containerPort: 8100
          hostPort: 8100
          protocol: TCP
      env:
        - name: LOG_PLATFORM_ES_URL
          value: "http://localhost:9200"
        - name: LOG_PLATFORM_MONGO_URL
          value: "mongodb://localhost:27017"
        - name: LOG_PLATFORM_REDIS_URL
          value: "redis://localhost:6379"
        - name: LOG_PLATFORM_HOST
          value: "0.0.0.0"
        - name: LOG_PLATFORM_PORT
          value: "8100"
      livenessProbe:
        httpGet:
          path: /api/v1/health
          port: 8100
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /api/v1/health
          port: 8100
        initialDelaySeconds: 10
        periodSeconds: 15
        timeoutSeconds: 5
        failureThreshold: 3
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
        limits:
          memory: "512Mi"
          cpu: "500m"

    - name: log-platform-worker
      image: localhost/taolib-log-platform:latest
      command: ["python", "-m", "taolib.log_platform.server.worker"]
      env:
        - name: LOG_PLATFORM_ES_URL
          value: "http://localhost:9200"
        - name: LOG_PLATFORM_MONGO_URL
          value: "mongodb://localhost:27017"
        - name: LOG_PLATFORM_REDIS_URL
          value: "redis://localhost:6379"
      resources:
        requests:
          memory: "256Mi"
          cpu: "200m"
        limits:
          memory: "512Mi"
          cpu: "500m"

    # ==================== 前端应用 ====================

    - name: log-platform-frontend
      image: localhost/taolib-log-platform-frontend:latest
      ports:
        - containerPort: 80
          hostPort: 3000
          protocol: TCP
      livenessProbe:
        httpGet:
          path: /health
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /health
          port: 80
        initialDelaySeconds: 3
        periodSeconds: 10
        timeoutSeconds: 3
        failureThreshold: 3
      resources:
        requests:
          memory: "64Mi"
          cpu: "50m"
        limits:
          memory: "128Mi"
          cpu: "100m"

  # ==================== 数据卷 ====================

  volumes:
    - name: mongo-data
      hostPath:
        path: /data/taolib/mongodb
        type: DirectoryOrCreate
    - name: redis-data
      hostPath:
        path: /data/taolib/redis
        type: DirectoryOrCreate
    - name: es-data
      hostPath:
        path: /data/taolib/elasticsearch
        type: DirectoryOrCreate
